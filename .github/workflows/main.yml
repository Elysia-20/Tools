name: Build Windows EXE

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard
          echo "Installed packages:"
          pip list
      
      - name: Verify modules
        run: |
          python -c "import sys
          modules = ['ui', 'workers', 'utils']
          for mod in modules:
              __import__(mod)
              print(f'[OK] {mod} imported')
          "

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -v

      - name: Prepare build metadata
        run: |
          $tag = "v$(Get-Date -Format 'yyyy.MM.dd.HHmmss')"

          echo "TAG=$tag" >> $env:GITHUB_ENV
          echo "RELEASE_DATE=$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" >> $env:GITHUB_ENV

      - name: Prepare version from tag
        run: |
          $tag = "${{ env.TAG }}" -replace '^v', ''
          $parts = $tag.Split('.') + @('0','0','0','0')
          $hhmm = $parts[3].Substring(0, [Math]::Min(4, $parts[3].Length))
          $fileVersion = "$($parts[0]).$($parts[1]).$($parts[2]).$hhmm"
          $productVersion = "$($parts[0]).$($parts[1]).$($parts[2])"

          echo "FILE_VERSION=$fileVersion" >> $env:GITHUB_ENV
          echo "PRODUCT_VERSION=$productVersion" >> $env:GITHUB_ENV
          echo "Resolved versions -> file: $fileVersion ; product: $productVersion"

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Build with Nuitka
        run: |
          python -m nuitka `
            --standalone `
            --lto=yes `
            --windows-console-mode=attach `
            --output-dir=dist `
            --output-filename=SecurityTool.exe `
            --include-package=ui `
            --include-package=workers `
            --include-package=utils `
            --enable-plugin=pyqt6 `
            --jobs=4 `
            --assume-yes-for-downloads `
            --show-progress `
            --company-name="Security Tools" `
            --product-name="Integrated Security Tool" `
            --file-version=$env:FILE_VERSION `
            --product-version=$env:PRODUCT_VERSION `
            --file-description="Security Tool Suite" `
            --include-module=traceback `
            --include-module=logging `
            main.py
      
      - name: Verify build and package ZIP
        if: always()
        run: |
          $distDir = "dist\main.dist"
          $exePath = "$distDir\SecurityTool.exe"
          $zipPath = "dist\SecurityTool-Windows-x64.zip"

          if (Test-Path $exePath) {
            # 打包成 ZIP
            Compress-Archive -Path "$distDir\*" -DestinationPath $zipPath -Force
            $exeSize = (Get-Item $exePath).Length / 1MB
            $zipSize = (Get-Item $zipPath).Length / 1MB

            echo "Build successful!"
            echo "EXE Size: $($exeSize.ToString('0.00')) MB"
            echo "ZIP Size: $($zipSize.ToString('0.00')) MB"

            echo "### Build Result" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "- **Status**: Success" >> $env:GITHUB_STEP_SUMMARY
            echo "- **Package**: SecurityTool-Windows-x64.zip" >> $env:GITHUB_STEP_SUMMARY
            echo "- **EXE Size**: $($exeSize.ToString('0.00')) MB" >> $env:GITHUB_STEP_SUMMARY
            echo "- **ZIP Size**: $($zipSize.ToString('0.00')) MB" >> $env:GITHUB_STEP_SUMMARY
            echo "- **Version**: $env:FILE_VERSION" >> $env:GITHUB_STEP_SUMMARY
          } else {
            echo "Build failed - EXE not found in $distDir"
            if (Test-Path "dist") { Get-ChildItem -Path "dist" -Recurse -Depth 2 | Select-Object FullName }

            echo "### Build Result" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "- **Status**: Failed" >> $env:GITHUB_STEP_SUMMARY
            exit 1
          }

      - name: Create release tag
        id: tag
        run: |
          $tag = "${{ env.TAG }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 检查 tag 是否已存在，避免重复推送失败
          if (git tag -l $tag) {
            Write-Host "Tag $tag already exists, using existing..."
          } else {
            git tag -a $tag -m "Automated release $tag"
            git push origin $tag
          }

          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "RELEASE_DATE=${{ env.RELEASE_DATE }}" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SecurityTool-Windows-x64
          path: dist/SecurityTool-Windows-x64.zip
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: Security Tool ${{ steps.tag.outputs.TAG }}
          body: |
            ## Automated Build

            **Version:** `${{ steps.tag.outputs.TAG }}`
            **Build Date:** `${{ steps.tag.outputs.RELEASE_DATE }}`
            **Platform:** Windows x64
            **Python:** 3.13

            ### 使用方式
            1. 下载 `SecurityTool-Windows-x64.zip`
            2. 解压到任意目录
            3. 运行 `SecurityTool.exe`

          files: dist/SecurityTool-Windows-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
